<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ピアノ練習ログ</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111827">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ピアノ練習">
<link rel="apple-touch-icon" href="icon.svg">
<style>
:root {
  --primary: #111827;
  --primary-light: #374151;
  --primary-pale: #f3f4f6;
  --bg: #f9fafb;
  --card: #ffffff;
  --border: #e5e7eb;
  --text: #111827;
  --muted: #6b7280;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
header { background: var(--primary); color: white; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
header h1 { font-size: 18px; font-weight: 700; }
.header-btns { display: flex; gap: 8px; }
.icon-btn { background: rgba(255,255,255,0.15); border: none; color: white; border-radius: 8px; padding: 6px 10px; cursor: pointer; font-size: 14px; }
.icon-btn:hover { background: rgba(255,255,255,0.25); }
.tabs { display: flex; background: var(--card); border-bottom: 1px solid var(--border); }
.tab { flex: 1; padding: 12px 8px; text-align: center; font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; border: none; background: none; border-bottom: 3px solid transparent; }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); }
.view { display: none; padding: 16px; max-width: 600px; margin: 0 auto; }
.view.active { display: block; }
.card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); padding: 16px; margin-bottom: 16px; }
.card h2 { font-size: 15px; font-weight: 700; margin-bottom: 12px; }
label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; color: var(--primary-light); }
input[type="date"], input[type="text"], input[type="number"], textarea {
  width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px;
  font-size: 14px; background: var(--bg); color: var(--text); outline: none;
}
input:focus, textarea:focus { border-color: var(--primary); }
textarea { resize: vertical; min-height: 70px; }
.form-row { margin-bottom: 12px; }
/* 気分セレクター */
.mood-selector { display: flex; gap: 8px; }
.mood-btn { flex: 1; border: 2px solid var(--border); border-radius: 10px; padding: 8px 4px; background: var(--bg); cursor: pointer; text-align: center; font-size: 20px; transition: all 0.15s; }
.mood-btn span { display: block; font-size: 11px; color: var(--muted); margin-top: 2px; }
.mood-btn.selected { border-color: var(--primary); background: var(--primary-pale); }
/* タイマー */
.timer-block { background: #111827; border-radius: 16px; padding: 20px; text-align: center; color: white; margin-bottom: 16px; }
.timer-display { font-size: 52px; font-weight: 700; letter-spacing: 2px; font-variant-numeric: tabular-nums; }
.timer-display.running { color: #d1fae5; }
.timer-btns { display: flex; gap: 10px; justify-content: center; margin-top: 14px; }
.btn-start { background: white; color: #111827; border: none; border-radius: 10px; padding: 10px 28px; font-size: 15px; font-weight: 700; cursor: pointer; }
.btn-start:hover { background: #f3f4f6; }
.btn-reset { background: rgba(255,255,255,0.15); color: white; border: none; border-radius: 10px; padding: 10px 20px; font-size: 15px; cursor: pointer; }
.btn-reset:hover { background: rgba(255,255,255,0.25); }
.items-list { margin-bottom: 12px; }
.item-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
.item-row input[type="number"] { width: 72px; flex-shrink: 0; }
.item-row input[type="text"] { flex: 1; }
.item-row .del-btn { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); cursor: pointer; padding: 8px 10px; font-size: 13px; flex-shrink: 0; }
.item-row .del-btn:hover { background: #fee2e2; color: #ef4444; border-color: #fca5a5; }
.add-item-btn { background: none; border: 1px dashed var(--border); border-radius: 8px; padding: 8px; width: 100%; color: var(--muted); font-size: 13px; cursor: pointer; }
.add-item-btn:hover { background: var(--bg); }
.btn-primary { background: var(--primary); color: white; border: none; border-radius: 10px; padding: 12px; width: 100%; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 4px; }
.btn-primary:hover { background: var(--primary-light); }
.filter-row { display: flex; gap: 8px; margin-bottom: 16px; align-items: flex-end; }
.filter-row > div { flex: 1; }
.filter-row .btn-primary { width: auto; padding: 10px 16px; margin-top: 16px; }
.record-card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); padding: 14px 16px; margin-bottom: 12px; }
.record-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.record-date { font-weight: 700; font-size: 15px; }
.record-total { background: var(--primary); color: white; border-radius: 20px; padding: 3px 10px; font-size: 12px; font-weight: 700; }
.record-items { font-size: 13px; color: var(--muted); }
.record-item { display: flex; gap: 8px; padding: 4px 0; border-top: 1px solid var(--border); }
.record-item:first-child { border-top: none; }
.record-item-time { font-weight: 600; color: var(--primary); width: 44px; flex-shrink: 0; }
.record-note { font-size: 13px; color: var(--muted); margin-top: 6px; font-style: italic; }
.record-actions { display: flex; gap: 8px; margin-top: 10px; }
.btn-sm { border: 1px solid var(--border); background: none; color: var(--muted); border-radius: 6px; padding: 5px 12px; font-size: 12px; cursor: pointer; }
.btn-sm:hover { background: var(--bg); }
.btn-sm.danger:hover { background: #fee2e2; color: #ef4444; border-color: #fca5a5; }
.empty-state { text-align: center; padding: 48px 16px; color: var(--muted); }
.empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
/* 統計 */
.stat-summary { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.stat-box { background: var(--card); border-radius: 10px; border: 1px solid var(--border); padding: 12px; text-align: center; }
.stat-box .num { font-size: 22px; font-weight: 700; }
.stat-box .lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }
/* 統計内タブ */
.stat-tabs { display: flex; background: var(--primary-pale); border-radius: 10px; padding: 4px; margin-bottom: 16px; gap: 4px; }
.stat-tab { flex: 1; padding: 8px 4px; text-align: center; font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; border: none; background: none; border-radius: 7px; }
.stat-tab.active { background: var(--primary); color: white; }
.stat-pane { display: none; }
.stat-pane.active { display: block; }
.chart-section { margin-bottom: 12px; }
.chart-title { font-size: 13px; font-weight: 700; margin-bottom: 10px; color: var(--primary-light); }
.bar-item { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.bar-label { font-size: 12px; color: var(--muted); flex-shrink: 0; text-align: right; }
.bar-track { flex: 1; background: var(--bg); border-radius: 4px; height: 18px; overflow: hidden; }
.bar-fill { height: 100%; background: var(--primary); border-radius: 4px; transition: width 0.4s; min-width: 2px; }
.bar-val { font-size: 12px; color: var(--muted); width: 40px; flex-shrink: 0; text-align: right; }
.year-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.year-chip { padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); font-size: 12px; cursor: pointer; background: var(--card); }
.year-chip.active { background: var(--primary); color: white; border-color: var(--primary); }
/* 気分分布 */
.mood-dist { display: flex; gap: 8px; }
.mood-dist-item { flex: 1; text-align: center; background: var(--bg); border-radius: 10px; padding: 10px 4px; }
.mood-dist-item .m-emoji { font-size: 22px; }
.mood-dist-item .m-count { font-size: 18px; font-weight: 700; margin-top: 4px; }
.mood-dist-item .m-label { font-size: 10px; color: var(--muted); }
/* よく練習する項目 */
.top-item-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.top-item-rank { font-size: 13px; font-weight: 700; width: 20px; color: var(--muted); flex-shrink: 0; }
.top-item-name { flex: 1; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.top-item-count { font-size: 12px; color: var(--muted); flex-shrink: 0; }
/* モーダル */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: white; border-radius: 16px; padding: 24px; width: 90%; max-width: 400px; }
.modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
.modal-btns { display: flex; gap: 10px; margin-top: 16px; justify-content: flex-end; }
.btn-cancel { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 8px 16px; font-size: 14px; cursor: pointer; }
.btn-danger { background: #ef4444; color: white; border: none; border-radius: 8px; padding: 8px 16px; font-size: 14px; cursor: pointer; }
.btn-secondary { background: var(--primary-pale); color: var(--primary); border: none; border-radius: 8px; padding: 8px 16px; font-size: 14px; font-weight: 600; cursor: pointer; }
#qr-container img, #qr-container canvas { margin: 0 auto; display: block; }
.ip-row { display: flex; gap: 8px; margin-top: 10px; }
.ip-row input { flex: 1; }
.ip-row button { white-space: nowrap; padding: 10px 12px; }
@media print {
  header, .tabs, .filter-row, .record-actions, .icon-btn, .header-btns { display: none !important; }
  .view { display: block !important; padding: 0; }
  .record-card { break-inside: avoid; border: 1px solid #ccc; }
  body { background: white; }
}
</style>
</head>
<body>

<header>
  <h1>🎹 ピアノ練習ログ</h1>
  <div class="header-btns">
    <button class="icon-btn" onclick="openQR()">QR</button>
    <button class="icon-btn" onclick="window.print()">PDF</button>
    <button class="icon-btn" onclick="openBackup()">💾</button>
  </div>
</header>

<div class="tabs">
  <button class="tab active" data-tab="input">記録</button>
  <button class="tab" data-tab="list">一覧</button>
  <button class="tab" data-tab="stats">統計</button>
</div>

<!-- 記録タブ -->
<div id="tab-input" class="view active">
  <div class="card">
    <div class="form-row">
      <label>練習日</label>
      <input type="date" id="input-date">
    </div>
    <div class="form-row">
      <label>今日の気分</label>
      <div class="mood-selector" id="mood-selector">
        <button class="mood-btn" data-mood="great" onclick="selectMood('great')">😄<span>最高</span></button>
        <button class="mood-btn" data-mood="good" onclick="selectMood('good')">🙂<span>良い</span></button>
        <button class="mood-btn" data-mood="normal" onclick="selectMood('normal')">😐<span>普通</span></button>
        <button class="mood-btn" data-mood="tired" onclick="selectMood('tired')">😫<span>疲れた</span></button>
        <button class="mood-btn" data-mood="fire" onclick="selectMood('fire')">🔥<span>やる気</span></button>
      </div>
    </div>
  </div>

  <!-- タイマー -->
  <div class="timer-block">
    <div id="timer-display" class="timer-display">00:00</div>
    <div class="timer-btns">
      <button class="btn-start" id="btn-start-stop" onclick="toggleTimer()">▶ スタート</button>
      <button class="btn-reset" onclick="resetTimer()">リセット</button>
    </div>
  </div>

  <div class="card">
    <h2>練習内容</h2>
    <div class="items-list" id="items-list"></div>
    <button class="add-item-btn" onclick="addItem()">＋ 練習項目を追加</button>
  </div>

  <div class="card">
    <div class="form-row">
      <label>メモ（任意）</label>
      <textarea id="input-note" placeholder="今日の感想など…"></textarea>
    </div>
    <button class="btn-primary" onclick="saveRecord()">保存する</button>
  </div>
</div>

<!-- 一覧タブ -->
<div id="tab-list" class="view">
  <div class="filter-row">
    <div>
      <label>開始日</label>
      <input type="date" id="filter-from">
    </div>
    <div>
      <label>終了日</label>
      <input type="date" id="filter-to">
    </div>
    <button class="btn-primary" onclick="renderList()">検索</button>
  </div>
  <div id="list-container"></div>
</div>

<!-- 統計タブ -->
<div id="tab-stats" class="view">
  <div class="stat-summary" id="stat-summary"></div>

  <!-- 統計内タブ -->
  <div class="stat-tabs">
    <button class="stat-tab active" data-pane="weekly" onclick="switchStatPane('weekly')">7日</button>
    <button class="stat-tab" data-pane="monthly" onclick="switchStatPane('monthly')">月別</button>
    <button class="stat-tab" data-pane="yearly" onclick="switchStatPane('yearly')">年別</button>
  </div>

  <!-- 7日 -->
  <div id="pane-weekly" class="stat-pane active">
    <div class="card">
      <div class="chart-title">直近7日の練習時間</div>
      <div id="weekly-chart"></div>
    </div>
  </div>

  <!-- 月別 -->
  <div id="pane-monthly" class="stat-pane">
    <div class="card">
      <div class="year-chips" id="year-chips-monthly"></div>
      <div id="monthly-chart"></div>
    </div>
  </div>

  <!-- 年別 -->
  <div id="pane-yearly" class="stat-pane">
    <div class="card">
      <div id="yearly-chart"></div>
    </div>
  </div>

  <!-- 気分の分布 -->
  <div class="card">
    <div class="chart-title">気分の分布</div>
    <div class="mood-dist" id="mood-dist"></div>
  </div>

  <!-- よく練習する項目 -->
  <div class="card">
    <div class="chart-title">よく練習する項目 TOP5</div>
    <div id="top-items"></div>
  </div>
</div>

<!-- 編集モーダル -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal" style="max-height:90vh;overflow-y:auto">
    <h3>記録を編集</h3>
    <div class="form-row">
      <label>練習日</label>
      <input type="date" id="edit-date">
    </div>
    <div class="form-row">
      <label>気分</label>
      <div class="mood-selector" id="edit-mood-selector">
        <button class="mood-btn" data-mood="great" onclick="selectEditMood('great')">😄<span>最高</span></button>
        <button class="mood-btn" data-mood="good"  onclick="selectEditMood('good')">🙂<span>良い</span></button>
        <button class="mood-btn" data-mood="normal" onclick="selectEditMood('normal')">😐<span>普通</span></button>
        <button class="mood-btn" data-mood="tired" onclick="selectEditMood('tired')">😫<span>疲れた</span></button>
        <button class="mood-btn" data-mood="fire"  onclick="selectEditMood('fire')">🔥<span>やる気</span></button>
      </div>
    </div>
    <div class="form-row">
      <label>練習内容</label>
      <div id="edit-items-list"></div>
      <button class="add-item-btn" onclick="addEditItem()">＋ 追加</button>
    </div>
    <div class="form-row">
      <label>メモ</label>
      <textarea id="edit-note" placeholder="メモ…"></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeEditModal()">キャンセル</button>
      <button class="btn-primary" style="width:auto;margin-top:0" onclick="saveEdit()">保存する</button>
    </div>
  </div>
</div>

<!-- 削除確認モーダル -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal">
    <h3>記録を削除しますか？</h3>
    <p style="font-size:14px;color:var(--muted);">この操作は取り消せません。</p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeDeleteModal()">キャンセル</button>
      <button class="btn-danger" onclick="confirmDelete()">削除する</button>
    </div>
  </div>
</div>

<!-- バックアップモーダル -->
<div class="modal-overlay" id="backup-modal">
  <div class="modal">
    <h3>💾 データのバックアップ</h3>
    <p style="font-size:13px;color:var(--muted);margin-bottom:16px">アプリを削除する前に必ずバックアップを取ってください。</p>
    <button class="btn-primary" onclick="exportData()" style="margin-bottom:10px">📤 書き出す（バックアップ）</button>
    <div style="border-top:1px solid var(--border);margin:12px 0"></div>
    <p style="font-size:13px;font-weight:600;margin-bottom:8px">📥 読み込む（復元）</p>
    <input type="file" id="import-file" accept=".json" style="font-size:13px;width:100%;margin-bottom:10px">
    <button class="btn-primary" onclick="importData()">復元する</button>
    <div class="modal-btns" style="margin-top:12px">
      <button class="btn-cancel" onclick="document.getElementById('backup-modal').classList.remove('open')">閉じる</button>
    </div>
  </div>
</div>

<!-- QRモーダル -->
<div class="modal-overlay" id="qr-modal">
  <div class="modal" style="text-align:center">
    <h3>スマホでインストール</h3>
    <div id="qr-container" style="display:flex;justify-content:center;margin:8px 0"></div>
    <p style="font-size:12px;color:var(--muted);margin-top:8px;" id="qr-url-label"></p>
    <div id="qr-localhost-warning" style="display:none">
      <p style="font-size:12px;color:#b45309;margin-top:8px;">ローカルサーバーのIPアドレスを入力してください：</p>
      <div class="ip-row">
        <input type="text" id="ip-input" placeholder="例: 192.168.1.5" style="font-size:14px">
        <button class="btn-secondary" onclick="updateQRWithIP()">更新</button>
      </div>
    </div>
    <div class="modal-btns" style="justify-content:center;margin-top:16px">
      <button class="btn-cancel" onclick="document.getElementById('qr-modal').classList.remove('open')">閉じる</button>
    </div>
  </div>
</div>

<script src="qrcode.min.js"></script>
<script>
const STORAGE_KEY = 'piano-practice-records';

function loadRecords() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}
function saveRecords(r) { localStorage.setItem(STORAGE_KEY, JSON.stringify(r)); }

// --- タイマー ---
let timerSec = 0, timerRunning = false, timerInterval = null;
function pad2(n) { return String(n).padStart(2,'0'); }
function updateTimerDisplay() {
  const el = document.getElementById('timer-display');
  el.textContent = pad2(Math.floor(timerSec/60)) + ':' + pad2(timerSec%60);
  el.className = 'timer-display' + (timerRunning ? ' running' : '');
}
function toggleTimer() {
  const btn = document.getElementById('btn-start-stop');
  if (!timerRunning) {
    timerRunning = true; btn.textContent = '⏸ 一時停止';
    timerInterval = setInterval(() => { timerSec++; updateTimerDisplay(); }, 1000);
  } else {
    timerRunning = false; btn.textContent = '▶ スタート';
    clearInterval(timerInterval);
    const mins = Math.round(timerSec / 60);
    if (mins > 0) {
      const rows = document.querySelectorAll('.item-dur');
      if (rows.length > 0 && !rows[rows.length-1].value) rows[rows.length-1].value = mins;
    }
  }
}
function resetTimer() {
  timerRunning = false; clearInterval(timerInterval); timerSec = 0;
  document.getElementById('btn-start-stop').textContent = '▶ スタート';
  updateTimerDisplay();
}

// --- 気分 ---
let selectedMood = '';
function selectMood(mood) {
  selectedMood = mood;
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.toggle('selected', b.dataset.mood === mood));
}

// --- 練習項目 ---
let itemCount = 0;
function addItem(dur='', text='') {
  itemCount++;
  const id = 'item-' + itemCount;
  const div = document.createElement('div');
  div.className = 'item-row'; div.id = id;
  div.innerHTML = `
    <input type="number" class="item-dur" placeholder="分" min="1" value="${dur}" style="width:64px">
    <input type="text" class="item-text" placeholder="練習内容（例：ハノン）" value="${escAttr(text)}">
    <button class="del-btn" onclick="document.getElementById('${id}').remove()">✕</button>
  `;
  document.getElementById('items-list').appendChild(div);
}
function escAttr(s) { return s.replace(/"/g,'&quot;'); }

// --- 保存 ---
function saveRecord() {
  const date = document.getElementById('input-date').value;
  if (!date) { alert('練習日を選んでください'); return; }
  const items = [];
  document.querySelectorAll('.item-row').forEach(row => {
    const dur = parseInt(row.querySelector('.item-dur').value) || 0;
    const text = row.querySelector('.item-text').value.trim();
    if (text || dur > 0) items.push({ dur, text });
  });
  if (items.length === 0) { alert('練習内容を1つ以上入力してください'); return; }
  const note = document.getElementById('input-note').value.trim();
  const total = items.reduce((s,i) => s+i.dur, 0);
  const records = loadRecords();
  records.push({ id: Date.now(), date, items, note, total, mood: selectedMood });
  saveRecords(records);
  document.getElementById('items-list').innerHTML = '';
  document.getElementById('input-note').value = '';
  selectedMood = '';
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
  resetTimer();
  addItem();
  alert('保存しました！');
  renderStats();
}

// --- 一覧 ---
let pendingDeleteId = null;
function renderList() {
  const from = document.getElementById('filter-from').value;
  const to = document.getElementById('filter-to').value;
  let records = loadRecords();
  if (from) records = records.filter(r => r.date >= from);
  if (to) records = records.filter(r => r.date <= to);
  records.sort((a,b) => b.date.localeCompare(a.date));
  const container = document.getElementById('list-container');
  if (!records.length) {
    container.innerHTML = '<div class="empty-state"><div class="emoji">🎹</div><p>記録がありません</p></div>';
    return;
  }
  const moodEmoji = { great:'😄', good:'🙂', normal:'😐', tired:'😫', fire:'🔥' };

  // 日付でグループ化
  const groups = {};
  records.forEach(r => {
    if (!groups[r.date]) groups[r.date] = [];
    groups[r.date].push(r);
  });
  const dates = Object.keys(groups).sort((a,b) => b.localeCompare(a));

  container.innerHTML = dates.map(date => {
    const dayRecords = groups[date];
    const dayTotal = dayRecords.reduce((s,r) => s+(r.total||0), 0);
    const moods = [...new Set(dayRecords.map(r=>r.mood).filter(Boolean))];

    const itemsHTML = dayRecords.map((r, idx) => {
      const section = r.items.map(i =>
        `<div class="record-item"><span class="record-item-time">${i.dur}分</span><span>${esc(i.text)}</span></div>`
      ).join('');
      const noteHTML = r.note ? `<div class="record-note">${esc(r.note)}</div>` : '';
      const divider = idx > 0 ? '<div style="border-top:1px dashed var(--border);margin:8px 0"></div>' : '';
      return divider + section + noteHTML;
    }).join('');

    const actionButtons = dayRecords.map(r => {
      const num = dayRecords.length > 1 ? ' #'+(dayRecords.indexOf(r)+1) : '';
      return `<button class="btn-sm" onclick="openEditModal(${r.id})">編集${num}</button>`
           + `<button class="btn-sm danger" onclick="openDeleteModal(${r.id})">削除${num}</button>`;
    }).join('');

    return `
      <div class="record-card">
        <div class="record-header">
          <span class="record-date">${date}${moods.length?` ${moods.map(m=>moodEmoji[m]||'').join('')}`:''}</span>
          <span class="record-total">${dayTotal}分</span>
        </div>
        <div class="record-items">${itemsHTML}</div>
        <div class="record-actions">${actionButtons}</div>
      </div>
    `;
  }).join('');
}
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
// --- 編集 ---
let editingId = null;
let editItemCount = 0;

function openEditModal(id) {
  const record = loadRecords().find(r => r.id === id);
  if (!record) return;
  editingId = id;

  document.getElementById('edit-date').value = record.date;
  document.getElementById('edit-note').value = record.note || '';

  // 気分
  document.querySelectorAll('#edit-mood-selector .mood-btn').forEach(b => b.classList.remove('selected'));
  if (record.mood) {
    const btn = document.querySelector(`#edit-mood-selector [data-mood="${record.mood}"]`);
    if (btn) btn.classList.add('selected');
  }

  // 練習項目
  editItemCount = 0;
  document.getElementById('edit-items-list').innerHTML = '';
  (record.items || []).forEach(i => addEditItem(i.dur, i.text));
  if (!record.items || record.items.length === 0) addEditItem();

  document.getElementById('edit-modal').classList.add('open');
}

function closeEditModal() {
  editingId = null;
  document.getElementById('edit-modal').classList.remove('open');
}

function selectEditMood(mood) {
  document.querySelectorAll('#edit-mood-selector .mood-btn').forEach(b =>
    b.classList.toggle('selected', b.dataset.mood === mood)
  );
}

function addEditItem(dur='', text='') {
  editItemCount++;
  const id = 'edit-item-' + editItemCount;
  const div = document.createElement('div');
  div.className = 'item-row'; div.id = id;
  div.innerHTML = `
    <input type="number" class="edit-item-dur" placeholder="分" min="1" value="${dur}" style="width:64px">
    <input type="text" class="edit-item-text" placeholder="練習内容" value="${escAttr(String(text))}">
    <button class="del-btn" onclick="document.getElementById('${id}').remove()">✕</button>
  `;
  document.getElementById('edit-items-list').appendChild(div);
}

function saveEdit() {
  if (!editingId) return;
  const date = document.getElementById('edit-date').value;
  if (!date) { alert('練習日を選んでください'); return; }

  const items = [];
  document.querySelectorAll('#edit-items-list .item-row').forEach(row => {
    const dur = parseInt(row.querySelector('.edit-item-dur').value) || 0;
    const text = row.querySelector('.edit-item-text').value.trim();
    if (text || dur > 0) items.push({ dur, text });
  });
  if (items.length === 0) { alert('練習内容を1つ以上入力してください'); return; }

  const note = document.getElementById('edit-note').value.trim();
  const total = items.reduce((s,i) => s+i.dur, 0);
  const moodSelected = document.querySelector('#edit-mood-selector .mood-btn.selected');
  const mood = moodSelected ? moodSelected.dataset.mood : '';

  const records = loadRecords().map(r =>
    r.id === editingId ? { ...r, date, items, note, total, mood } : r
  );
  saveRecords(records);
  closeEditModal();
  renderList();
  renderStats();
}

function openDeleteModal(id) { pendingDeleteId = id; document.getElementById('delete-modal').classList.add('open'); }
function closeDeleteModal() { pendingDeleteId = null; document.getElementById('delete-modal').classList.remove('open'); }
function confirmDelete() {
  if (!pendingDeleteId) return;
  saveRecords(loadRecords().filter(r => r.id !== pendingDeleteId));
  closeDeleteModal(); renderList(); renderStats();
}

// --- 統計タブ切替 ---
function switchStatPane(name) {
  document.querySelectorAll('.stat-tab').forEach(t => t.classList.toggle('active', t.dataset.pane === name));
  document.querySelectorAll('.stat-pane').forEach(p => p.classList.toggle('active', p.id === 'pane-' + name));
}

// --- 統計 ---
let selectedYearMonthly = null;

function renderStats() {
  const records = loadRecords();
  const totalMin = records.reduce((s,r) => s+(r.total||0), 0);
  const totalDays = new Set(records.map(r=>r.date)).size;
  const avgMin = totalDays > 0 ? Math.round(totalMin/totalDays) : 0;
  document.getElementById('stat-summary').innerHTML = `
    <div class="stat-box"><div class="num">${totalDays}</div><div class="lbl">練習日数</div></div>
    <div class="stat-box"><div class="num">${Math.round(totalMin/60*10)/10}h</div><div class="lbl">総時間</div></div>
    <div class="stat-box"><div class="num">${avgMin}分</div><div class="lbl">1日平均</div></div>
  `;

  // 週間
  const today = new Date();
  const weekData = [];
  for (let i=6;i>=0;i--) {
    const d = new Date(today); d.setDate(d.getDate()-i);
    const ds = d.toISOString().slice(0,10);
    const mins = records.filter(r=>r.date===ds).reduce((s,r)=>s+(r.total||0),0);
    weekData.push({ label: ['日','月','火','水','木','金','土'][d.getDay()], mins });
  }
  renderBarChart(document.getElementById('weekly-chart'), weekData, 28);

  // 年別
  const yearMap = {};
  records.forEach(r => { const y=r.date.slice(0,4); yearMap[y]=(yearMap[y]||0)+(r.total||0); });
  const years = Object.keys(yearMap).sort();
  renderBarChart(document.getElementById('yearly-chart'), years.map(y=>({label:y,mins:yearMap[y]})), 48);

  // 月別
  if (!selectedYearMonthly || !years.includes(selectedYearMonthly))
    selectedYearMonthly = years[years.length-1] || String(new Date().getFullYear());
  const chipsEl = document.getElementById('year-chips-monthly');
  chipsEl.innerHTML = years.map(y =>
    `<div class="year-chip ${y===selectedYearMonthly?'active':''}" onclick="selectYearMonthly('${y}')">${y}年</div>`
  ).join('');
  renderMonthlyChart(records);

  // 気分分布
  const moods = [
    { key:'great', emoji:'😄', label:'最高' },
    { key:'good',  emoji:'🙂', label:'良い' },
    { key:'normal',emoji:'😐', label:'普通' },
    { key:'tired', emoji:'😫', label:'疲れた' },
    { key:'fire',  emoji:'🔥', label:'やる気' },
  ];
  const moodCount = {};
  records.forEach(r => { if(r.mood) moodCount[r.mood]=(moodCount[r.mood]||0)+1; });
  document.getElementById('mood-dist').innerHTML = moods.map(m => `
    <div class="mood-dist-item">
      <div class="m-emoji">${m.emoji}</div>
      <div class="m-count">${moodCount[m.key]||0}</div>
      <div class="m-label">${m.label}</div>
    </div>
  `).join('');

  // よく練習する項目 TOP5
  const itemCount_ = {};
  records.forEach(r => r.items.forEach(i => {
    const k = i.text.trim();
    if (k) itemCount_[k] = (itemCount_[k]||0) + 1;
  }));
  const topItems = Object.entries(itemCount_).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const topEl = document.getElementById('top-items');
  if (!topItems.length) {
    topEl.innerHTML = '<p style="font-size:13px;color:var(--muted)">データがありません</p>';
  } else {
    topEl.innerHTML = topItems.map(([name,cnt],i) => `
      <div class="top-item-row">
        <div class="top-item-rank">${i+1}</div>
        <div class="top-item-name">${esc(name)}</div>
        <div class="top-item-count">${cnt}回</div>
      </div>
    `).join('');
  }
}

function selectYearMonthly(y) {
  selectedYearMonthly = y;
  renderMonthlyChart(loadRecords());
  document.querySelectorAll('#year-chips-monthly .year-chip').forEach(c =>
    c.classList.toggle('active', c.textContent === y+'年')
  );
}

function renderMonthlyChart(records) {
  const data = Array.from({length:12},(_,i)=>{
    const m = String(i+1).padStart(2,'0');
    const mins = records.filter(r=>r.date.startsWith(selectedYearMonthly+'-'+m)).reduce((s,r)=>s+(r.total||0),0);
    return { label:(i+1)+'月', mins };
  });
  renderBarChart(document.getElementById('monthly-chart'), data, 44);
}

function renderBarChart(el, data, labelWidth) {
  const max = Math.max(...data.map(d=>d.mins), 1);
  el.innerHTML = data.map(d => `
    <div class="bar-item">
      <div class="bar-label" style="width:${labelWidth}px">${d.label}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(d.mins/max*100)}%"></div></div>
      <div class="bar-val">${d.mins>=60?Math.round(d.mins/6)/10+'h':d.mins>0?d.mins+'分':''}</div>
    </div>
  `).join('');
}

// --- バックアップ ---
function openBackup() {
  document.getElementById('backup-modal').classList.add('open');
}
function exportData() {
  const records = loadRecords();
  const json = JSON.stringify(records, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href = url; a.download = `piano-backup-${date}.json`;
  a.click(); URL.revokeObjectURL(url);
}
function importData() {
  const file = document.getElementById('import-file').files[0];
  if (!file) { alert('JSONファイルを選択してください'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error();
      const existing = loadRecords();
      const existingIds = new Set(existing.map(r => r.id));
      const merged = [...existing, ...data.filter(r => !existingIds.has(r.id))];
      merged.sort((a,b) => a.date.localeCompare(b.date));
      saveRecords(merged);
      document.getElementById('backup-modal').classList.remove('open');
      alert(`${data.length}件のデータを復元しました！`);
      renderList(); renderStats();
    } catch { alert('ファイルの形式が正しくありません'); }
  };
  reader.readAsText(file);
}

// --- QR ---
function openQR() {
  document.getElementById('qr-modal').classList.add('open');
  const isLocal = location.hostname==='localhost'||location.hostname==='127.0.0.1';
  document.getElementById('qr-localhost-warning').style.display = isLocal?'block':'none';
  const url = isLocal ? `http://${location.hostname}:${location.port||80}/` : location.href.split('?')[0];
  generateQR(url);
}
function generateQR(url) {
  document.getElementById('qr-url-label').textContent = url;
  const container = document.getElementById('qr-container');
  container.innerHTML = '';
  if (typeof QRCode !== 'undefined') {
    new QRCode(container, {
      text: url,
      width: 200,
      height: 200,
      colorDark: '#000000',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
  }
}
function updateQRWithIP() {
  const ip = document.getElementById('ip-input').value.trim();
  if (!ip) return;
  generateQR(`http://${ip}${location.port?':'+location.port:''}/`);
}

// --- タブ切替 ---
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-'+tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab==='list') renderList();
    if (tab.dataset.tab==='stats') renderStats();
  });
});

// --- 初期化 ---
(function init() {
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('input-date').value = today;
  document.getElementById('filter-from').value = new Date(Date.now()-30*86400000).toISOString().slice(0,10);
  document.getElementById('filter-to').value = today;
  addItem();
  updateTimerDisplay();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(console.warn);
})();
</script>
