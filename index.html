<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ピアノ練習ログ</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111827">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ピアノ練習">
<link rel="apple-touch-icon" href="icon.svg">
<style>
:root {
  --primary: #111827;
  --primary-light: #374151;
  --primary-pale: #f3f4f6;
  --bg: #f9fafb;
  --card: #ffffff;
  --border: #e5e7eb;
  --text: #111827;
  --muted: #6b7280;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
header { background: var(--primary); color: white; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
header h1 { font-size: 18px; font-weight: 700; }
.header-btns { display: flex; gap: 8px; }
.icon-btn { background: rgba(255,255,255,0.15); border: none; color: white; border-radius: 8px; padding: 6px 10px; cursor: pointer; font-size: 14px; }
.icon-btn:hover { background: rgba(255,255,255,0.25); }
.tabs { display: flex; background: var(--card); border-bottom: 1px solid var(--border); }
.tab { flex: 1; padding: 12px 8px; text-align: center; font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; border: none; background: none; border-bottom: 3px solid transparent; }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); }
.view { display: none; padding: 16px; max-width: 600px; margin: 0 auto; }
.view.active { display: block; }
.card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); padding: 16px; margin-bottom: 16px; }
.card h2 { font-size: 15px; font-weight: 700; margin-bottom: 12px; }
label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; color: var(--primary-light); }
input[type="date"], input[type="text"], input[type="number"], textarea {
  width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px;
  font-size: 14px; background: var(--bg); color: var(--text); outline: none;
}
input:focus, textarea:focus { border-color: var(--primary); }
textarea { resize: vertical; min-height: 70px; }
.form-row { margin-bottom: 12px; }
.timer-block { background: #111827; border-radius: 16px; padding: 20px; text-align: center; color: white; margin-bottom: 16px; }
.timer-display { font-size: 52px; font-weight: 700; letter-spacing: 2px; font-variant-numeric: tabular-nums; }
.timer-display.running { color: #d1fae5; }
.timer-btns { display: flex; gap: 10px; justify-content: center; margin-top: 14px; }
.btn-start { background: white; color: #111827; border: none; border-radius: 10px; padding: 10px 28px; font-size: 15px; font-weight: 700; cursor: pointer; }
.btn-start:hover { background: #f3f4f6; }
.btn-reset { background: rgba(255,255,255,0.15); color: white; border: none; border-radius: 10px; padding: 10px 20px; font-size: 15px; cursor: pointer; }
.btn-reset:hover { background: rgba(255,255,255,0.25); }
.items-list { margin-bottom: 12px; }
.item-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
.item-row input[type="number"] { width: 72px; flex-shrink: 0; }
.item-row input[type="text"] { flex: 1; }
.item-row .del-btn { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); cursor: pointer; padding: 8px 10px; font-size: 13px; flex-shrink: 0; }
.item-row .del-btn:hover { background: #fee2e2; color: #ef4444; border-color: #fca5a5; }
.add-item-btn { background: none; border: 1px dashed var(--border); border-radius: 8px; padding: 8px; width: 100%; color: var(--muted); font-size: 13px; cursor: pointer; }
.add-item-btn:hover { background: var(--bg); }
.btn-primary { background: var(--primary); color: white; border: none; border-radius: 10px; padding: 12px; width: 100%; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 4px; }
.btn-primary:hover { background: var(--primary-light); }
.filter-row { display: flex; gap: 8px; margin-bottom: 16px; align-items: flex-end; }
.filter-row > div { flex: 1; }
.filter-row .btn-primary { width: auto; padding: 10px 16px; margin-top: 16px; }
.record-card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); padding: 14px 16px; margin-bottom: 12px; }
.record-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.record-date { font-weight: 700; font-size: 15px; }
.record-total { background: var(--primary); color: white; border-radius: 20px; padding: 3px 10px; font-size: 12px; font-weight: 700; }
.record-items { font-size: 13px; color: var(--muted); }
.record-item { display: flex; gap: 8px; padding: 4px 0; border-top: 1px solid var(--border); }
.record-item:first-child { border-top: none; }
.record-item-time { font-weight: 600; color: var(--primary); width: 44px; flex-shrink: 0; }
.record-note { font-size: 13px; color: var(--muted); margin-top: 6px; font-style: italic; }
.record-actions { display: flex; gap: 8px; margin-top: 10px; }
.btn-sm { border: 1px solid var(--border); background: none; color: var(--muted); border-radius: 6px; padding: 5px 12px; font-size: 12px; cursor: pointer; }
.btn-sm:hover { background: var(--bg); }
.btn-sm.danger:hover { background: #fee2e2; color: #ef4444; border-color: #fca5a5; }
.empty-state { text-align: center; padding: 48px 16px; color: var(--muted); }
.empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
.stat-summary { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.stat-box { background: var(--card); border-radius: 10px; border: 1px solid var(--border); padding: 12px; text-align: center; }
.stat-box .num { font-size: 22px; font-weight: 700; }
.stat-box .lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }
.chart-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; }
.bar-item { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.bar-label { font-size: 12px; color: var(--muted); width: 28px; flex-shrink: 0; text-align: right; }
.bar-track { flex: 1; background: var(--bg); border-radius: 4px; height: 18px; overflow: hidden; }
.bar-fill { height: 100%; background: var(--primary); border-radius: 4px; transition: width 0.4s; min-width: 2px; }
.bar-val { font-size: 12px; color: var(--muted); width: 36px; flex-shrink: 0; }
.month-label { width: 44px !important; }
.year-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.year-chip { padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); font-size: 12px; cursor: pointer; background: var(--card); }
.year-chip.active { background: var(--primary); color: white; border-color: var(--primary); }
/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: white; border-radius: 16px; padding: 24px; width: 90%; max-width: 400px; }
.modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
.modal-btns { display: flex; gap: 10px; margin-top: 16px; justify-content: flex-end; }
.btn-cancel { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 8px 16px; font-size: 14px; cursor: pointer; }
.btn-danger { background: #ef4444; color: white; border: none; border-radius: 8px; padding: 8px 16px; font-size: 14px; cursor: pointer; }
.btn-secondary { background: var(--primary-pale); color: var(--primary); border: none; border-radius: 8px; padding: 8px 16px; font-size: 14px; font-weight: 600; cursor: pointer; }
#qr-canvas { margin: 0 auto; display: block; }
.ip-row { display: flex; gap: 8px; margin-top: 10px; }
.ip-row input { flex: 1; }
.ip-row button { white-space: nowrap; padding: 10px 12px; }
/* Print */
@media print {
  header, .tabs, .filter-row, .record-actions, .icon-btn, .header-btns { display: none !important; }
  .view { display: block !important; padding: 0; }
  .record-card { break-inside: avoid; border: 1px solid #ccc; }
  body { background: white; }
}
</style>
</head>
<body>

<header>
  <h1>🎹 ピアノ練習ログ</h1>
  <div class="header-btns">
    <button class="icon-btn" onclick="openQR()">QR</button>
    <button class="icon-btn" onclick="window.print()">PDF</button>
  </div>
</header>

<div class="tabs">
  <button class="tab active" data-tab="input">記録</button>
  <button class="tab" data-tab="list">一覧</button>
  <button class="tab" data-tab="stats">統計</button>
</div>

<!-- 記録タブ -->
<div id="tab-input" class="view active">
  <div class="card">
    <div class="form-row">
      <label>練習日</label>
      <input type="date" id="input-date">
    </div>
  </div>

  <!-- タイマー -->
  <div class="timer-block">
    <div id="timer-display" class="timer-display">00:00</div>
    <div class="timer-btns">
      <button class="btn-start" id="btn-start-stop" onclick="toggleTimer()">▶ スタート</button>
      <button class="btn-reset" onclick="resetTimer()">リセット</button>
    </div>
  </div>

  <div class="card">
    <h2>練習内容</h2>
    <div class="items-list" id="items-list"></div>
    <button class="add-item-btn" onclick="addItem()">＋ 練習項目を追加</button>
  </div>

  <div class="card">
    <div class="form-row">
      <label>メモ（任意）</label>
      <textarea id="input-note" placeholder="今日の感想など…"></textarea>
    </div>
    <button class="btn-primary" onclick="saveRecord()">保存する</button>
  </div>
</div>

<!-- 一覧タブ -->
<div id="tab-list" class="view">
  <div class="filter-row">
    <div>
      <label>開始日</label>
      <input type="date" id="filter-from">
    </div>
    <div>
      <label>終了日</label>
      <input type="date" id="filter-to">
    </div>
    <button class="btn-primary" onclick="renderList()">検索</button>
  </div>
  <div id="list-container"></div>
</div>

<!-- 統計タブ -->
<div id="tab-stats" class="view">
  <div class="stat-summary" id="stat-summary"></div>

  <div class="card">
    <div class="chart-title">週間（直近7日）</div>
    <div id="weekly-chart"></div>
  </div>

  <div class="card">
    <div class="chart-title">月別</div>
    <div class="year-chips" id="year-chips-monthly"></div>
    <div id="monthly-chart"></div>
  </div>

  <div class="card">
    <div class="chart-title">年別</div>
    <div id="yearly-chart"></div>
  </div>
</div>

<!-- 削除確認モーダル -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal">
    <h3>記録を削除しますか？</h3>
    <p style="font-size:14px;color:var(--muted);">この操作は取り消せません。</p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeDeleteModal()">キャンセル</button>
      <button class="btn-danger" onclick="confirmDelete()">削除する</button>
    </div>
  </div>
</div>

<!-- QRモーダル -->
<div class="modal-overlay" id="qr-modal">
  <div class="modal" style="text-align:center">
    <h3>スマホでインストール</h3>
    <canvas id="qr-canvas"></canvas>
    <p style="font-size:12px;color:var(--muted);margin-top:8px;" id="qr-url-label"></p>
    <div id="qr-localhost-warning" style="display:none">
      <p style="font-size:12px;color:#b45309;margin-top:8px;">ローカルサーバーのIPアドレスを入力してください：</p>
      <div class="ip-row">
        <input type="text" id="ip-input" placeholder="例: 192.168.1.5" style="font-size:14px">
        <button class="btn-secondary" onclick="updateQRWithIP()">更新</button>
      </div>
    </div>
    <div class="modal-btns" style="justify-content:center;margin-top:16px">
      <button class="btn-cancel" onclick="document.getElementById('qr-modal').classList.remove('open')">閉じる</button>
    </div>
  </div>
</div>

<script src="qrcode.min.js"></script>
<script>
// --- データ管理 ---
const STORAGE_KEY = 'piano-practice-records';

function loadRecords() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}
function saveRecords(records) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
}

// --- タイマー ---
let timerSec = 0, timerRunning = false, timerInterval = null;

function pad2(n) { return String(n).padStart(2, '0'); }

function updateTimerDisplay() {
  const m = Math.floor(timerSec / 60), s = timerSec % 60;
  const el = document.getElementById('timer-display');
  el.textContent = pad2(m) + ':' + pad2(s);
  el.className = 'timer-display' + (timerRunning ? ' running' : '');
}

function toggleTimer() {
  const btn = document.getElementById('btn-start-stop');
  if (!timerRunning) {
    timerRunning = true;
    btn.textContent = '⏸ 一時停止';
    timerInterval = setInterval(() => { timerSec++; updateTimerDisplay(); }, 1000);
  } else {
    timerRunning = false;
    btn.textContent = '▶ スタート';
    clearInterval(timerInterval);
    // 計測時間をduration欄に反映
    const mins = Math.round(timerSec / 60);
    if (mins > 0) {
      const rows = document.querySelectorAll('.item-dur');
      if (rows.length > 0) {
        const last = rows[rows.length - 1];
        if (!last.value) last.value = mins;
      }
    }
  }
}

function resetTimer() {
  timerRunning = false;
  clearInterval(timerInterval);
  timerSec = 0;
  document.getElementById('btn-start-stop').textContent = '▶ スタート';
  updateTimerDisplay();
}

// --- 練習項目 ---
let itemCount = 0;

function addItem(dur='', text='') {
  itemCount++;
  const id = 'item-' + itemCount;
  const div = document.createElement('div');
  div.className = 'item-row';
  div.id = id;
  div.innerHTML = `
    <input type="number" class="item-dur" placeholder="分" min="1" value="${dur}" style="width:64px">
    <input type="text" class="item-text" placeholder="練習内容（例：ハノン）" value="${text}">
    <button class="del-btn" onclick="document.getElementById('${id}').remove()">✕</button>
  `;
  document.getElementById('items-list').appendChild(div);
}

// --- 保存 ---
function saveRecord() {
  const date = document.getElementById('input-date').value;
  if (!date) { alert('練習日を選んでください'); return; }

  const items = [];
  document.querySelectorAll('.item-row').forEach(row => {
    const dur = parseInt(row.querySelector('.item-dur').value) || 0;
    const text = row.querySelector('.item-text').value.trim();
    if (text || dur > 0) items.push({ dur, text });
  });

  if (items.length === 0) { alert('練習内容を1つ以上入力してください'); return; }

  const note = document.getElementById('input-note').value.trim();
  const total = items.reduce((s, i) => s + i.dur, 0);

  const records = loadRecords();
  records.push({ id: Date.now(), date, items, note, total });
  saveRecords(records);

  // リセット
  document.getElementById('items-list').innerHTML = '';
  document.getElementById('input-note').value = '';
  resetTimer();
  addItem();
  alert('保存しました！');
  renderStats();
}

// --- 一覧 ---
let pendingDeleteId = null;

function renderList() {
  const from = document.getElementById('filter-from').value;
  const to = document.getElementById('filter-to').value;
  let records = loadRecords();
  if (from) records = records.filter(r => r.date >= from);
  if (to) records = records.filter(r => r.date <= to);
  records.sort((a, b) => b.date.localeCompare(a.date));

  const container = document.getElementById('list-container');
  if (records.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="emoji">🎹</div><p>記録がありません</p></div>';
    return;
  }

  container.innerHTML = records.map(r => `
    <div class="record-card">
      <div class="record-header">
        <span class="record-date">${r.date}</span>
        <span class="record-total">${r.total}分</span>
      </div>
      <div class="record-items">
        ${r.items.map(i => `<div class="record-item"><span class="record-item-time">${i.dur}分</span><span>${i.text}</span></div>`).join('')}
      </div>
      ${r.note ? `<div class="record-note">${r.note}</div>` : ''}
      <div class="record-actions">
        <button class="btn-sm danger" onclick="openDeleteModal(${r.id})">削除</button>
      </div>
    </div>
  `).join('');
}

function openDeleteModal(id) {
  pendingDeleteId = id;
  document.getElementById('delete-modal').classList.add('open');
}
function closeDeleteModal() {
  pendingDeleteId = null;
  document.getElementById('delete-modal').classList.remove('open');
}
function confirmDelete() {
  if (!pendingDeleteId) return;
  const records = loadRecords().filter(r => r.id !== pendingDeleteId);
  saveRecords(records);
  closeDeleteModal();
  renderList();
  renderStats();
}

// --- 統計 ---
let selectedYearMonthly = null;

function renderStats() {
  const records = loadRecords();

  // サマリー
  const totalMin = records.reduce((s, r) => s + (r.total || 0), 0);
  const totalDays = records.length;
  const avgMin = totalDays > 0 ? Math.round(totalMin / totalDays) : 0;
  document.getElementById('stat-summary').innerHTML = `
    <div class="stat-box"><div class="num">${totalDays}</div><div class="lbl">練習日数</div></div>
    <div class="stat-box"><div class="num">${Math.round(totalMin/60*10)/10}h</div><div class="lbl">総練習時間</div></div>
    <div class="stat-box"><div class="num">${avgMin}分</div><div class="lbl">1日平均</div></div>
  `;

  // 週間チャート
  const weeklyEl = document.getElementById('weekly-chart');
  const today = new Date();
  const weekData = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(today); d.setDate(d.getDate() - i);
    const ds = d.toISOString().slice(0,10);
    const mins = records.filter(r => r.date === ds).reduce((s, r) => s + (r.total||0), 0);
    const day = ['日','月','火','水','木','金','土'][d.getDay()];
    weekData.push({ label: day, mins });
  }
  renderBarChart(weeklyEl, weekData, '分');

  // 年別チャート
  const yearMap = {};
  records.forEach(r => {
    const y = r.date.slice(0,4);
    yearMap[y] = (yearMap[y]||0) + (r.total||0);
  });
  const years = Object.keys(yearMap).sort();
  const yearlyEl = document.getElementById('yearly-chart');
  renderBarChart(yearlyEl, years.map(y => ({ label: y, mins: yearMap[y] })), '分', true);

  // 月別チャート - 年選択チップ
  const chipsEl = document.getElementById('year-chips-monthly');
  if (!selectedYearMonthly || !years.includes(selectedYearMonthly)) {
    selectedYearMonthly = years[years.length - 1] || new Date().getFullYear().toString();
  }
  chipsEl.innerHTML = years.map(y =>
    `<div class="year-chip ${y===selectedYearMonthly?'active':''}" onclick="selectYearMonthly('${y}')">${y}年</div>`
  ).join('');
  renderMonthlyChart(records);
}

function selectYearMonthly(y) {
  selectedYearMonthly = y;
  renderStats();
}

function renderMonthlyChart(records) {
  const monthlyEl = document.getElementById('monthly-chart');
  const monthData = Array.from({length:12}, (_,i) => {
    const m = String(i+1).padStart(2,'0');
    const mins = records.filter(r => r.date.startsWith(selectedYearMonthly+'-'+m)).reduce((s,r)=>s+(r.total||0),0);
    return { label: (i+1)+'月', mins };
  });
  renderBarChart(monthlyEl, monthData, '分', false, true);
}

function renderBarChart(el, data, unit='分', longLabel=false, monthLabel=false) {
  const max = Math.max(...data.map(d=>d.mins), 1);
  el.innerHTML = data.map(d => `
    <div class="bar-item">
      <div class="bar-label ${monthLabel?'month-label':''}" style="width:${longLabel?'44px':'28px'}">${d.label}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(d.mins/max*100)}%"></div></div>
      <div class="bar-val">${d.mins>0?(d.mins>=60?Math.round(d.mins/6)/10+'h':d.mins+'分'):''}</div>
    </div>
  `).join('');
}

// --- QRコード ---
function openQR() {
  const modal = document.getElementById('qr-modal');
  modal.classList.add('open');
  const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
  document.getElementById('qr-localhost-warning').style.display = isLocal ? 'block' : 'none';

  const url = isLocal
    ? `http://${location.hostname}:${location.port||80}/`
    : location.href.split('?')[0];

  generateQR(url);
}

function generateQR(url) {
  const canvas = document.getElementById('qr-canvas');
  canvas.width = 200; canvas.height = 200;
  document.getElementById('qr-url-label').textContent = url;
  if (typeof QRCode !== 'undefined') {
    QRCode.toCanvas(canvas, url, { width: 200, margin: 2, color: { dark: '#000000', light: '#ffffff' } });
  }
}

function updateQRWithIP() {
  const ip = document.getElementById('ip-input').value.trim();
  if (!ip) return;
  const port = location.port ? ':' + location.port : '';
  generateQR(`http://${ip}${port}/`);
}

// --- タブ切替 ---
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab === 'list') renderList();
    if (tab.dataset.tab === 'stats') renderStats();
  });
});

// --- 初期化 ---
(function init() {
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('input-date').value = today;
  document.getElementById('filter-from').value = new Date(Date.now() - 30*86400000).toISOString().slice(0,10);
  document.getElementById('filter-to').value = today;
  addItem();
  updateTimerDisplay();

  if ('serviceWorker' in navigator) {

})();
